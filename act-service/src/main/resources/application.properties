spring.application.name=act-service
server.port=8083
spring.threads.virtual.enabled=true

# PostgreSQL
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/chimera}
spring.datasource.username=${POSTGRES_USER:chimera}
spring.datasource.password=${POSTGRES_PASSWORD:chimera_dev}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.connection-timeout=30000
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history_act

# Upstream service URLs
content.creator.url=${CONTENT_CREATOR_URL:http://localhost:8082}
learn.service.url=${LEARN_SERVICE_URL:http://localhost:8084}

# Platform publisher credentials
tiktok.access-token=${TIKTOK_ACCESS_TOKEN:REPLACE_ME}
instagram.access-token=${INSTAGRAM_ACCESS_TOKEN:REPLACE_ME}
x.bearer-token=${X_BEARER_TOKEN:REPLACE_ME}

# Human alert delivery
alert.webhook.url=${ALERT_WEBHOOK_URL:}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
