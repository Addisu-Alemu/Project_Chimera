spring.application.name=content-creator
server.port=8082
spring.threads.virtual.enabled=true

# Upstream service URLs
trend.watcher.url=${TREND_WATCHER_URL:http://localhost:8081}
learn.service.url=${LEARN_SERVICE_URL:http://localhost:8084}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
