spring.application.name=learn-service
server.port=8084
spring.threads.virtual.enabled=true

# PostgreSQL
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/chimera}
spring.datasource.username=${POSTGRES_USER:chimera}
spring.datasource.password=${POSTGRES_PASSWORD:chimera_dev}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.connection-timeout=30000
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history_learn
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Upstream service URLs
trend.watcher.url=${TREND_WATCHER_URL:http://localhost:8081}
content.creator.url=${CONTENT_CREATOR_URL:http://localhost:8082}

# Human alert delivery
alert.webhook.url=${ALERT_WEBHOOK_URL:}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
